<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Register</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head>
<body><div class="container py-5" style="max-width:500px;"><h1>Register</h1><form id="registerForm" class="card p-4"><input type="hidden" name="action" value="register"><input name="name" class="form-control mb-3" placeholder="Name" required><input name="email" class="form-control mb-3" type="email" placeholder="Email" required><input name="password" class="form-control mb-3" type="password" placeholder="Password" required><button class="btn btn-primary">Create Account</button></form><div id="msg"></div></div><script src="https://code.jquery.com/jquery-3.7.1.min.js"></script><script>$('#registerForm').on('submit',function(e){e.preventDefault();$.post('includes/auth.php',$(this).serialize(),r=>$('#msg').html(`<div class='alert alert-success mt-3'>${r.message}</div>`),'json').fail(x=>$('#msg').html(`<div class='alert alert-danger mt-3'>${x.responseJSON?.message||'Register failed'}</div>`));});</script></body></html>
