<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head>
<body><div class="container py-5" style="max-width:500px;"><h1>Login</h1><form id="loginForm" class="card p-4"><input type="hidden" name="action" value="login"><input name="email" class="form-control mb-3" type="email" placeholder="Email" required><input name="password" class="form-control mb-3" type="password" placeholder="Password" required><button class="btn btn-primary">Login</button><a href="register.html" class="btn btn-link">Create account</a></form><div id="msg"></div></div><script src="https://code.jquery.com/jquery-3.7.1.min.js"></script><script>$('#loginForm').on('submit',function(e){e.preventDefault();$.post('includes/auth.php',$(this).serialize(),r=>{location.href='dashboard.php';},'json').fail(x=>$('#msg').html(`<div class='alert alert-danger mt-3'>${x.responseJSON?.message||'Login failed'}</div>`));});</script></body></html>
