<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Contact - web4you</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head>
<body><div class="container py-5"><h1>Contact Us</h1><form id="contactForm" class="card p-4"><input name="name" class="form-control mb-3" placeholder="Name" required><input name="email" type="email" class="form-control mb-3" placeholder="Email" required><textarea name="message" class="form-control mb-3" rows="5" placeholder="Message" required></textarea><button class="btn btn-primary">Send Message</button></form><div id="contactMsg" class="mt-3"></div></div><script src="https://code.jquery.com/jquery-3.7.1.min.js"></script><script src="js/app.js"></script><script>$('#contactForm').on('submit', function(e){e.preventDefault();$.post('includes/contact.php', $(this).serialize(), r=>$('#contactMsg').html(`<div class="alert alert-success">${r.message}</div>`),'json').fail(x=>$('#contactMsg').html(`<div class="alert alert-danger">${x.responseJSON?.message||'Error'}</div>`));});</script></body></html>
