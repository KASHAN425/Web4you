<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cart</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head>
<body><div class="container py-5"><h1>Your Cart</h1><table class="table" id="cartTable"><thead><tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th></tr></thead><tbody></tbody></table><a class="btn btn-primary" href="checkout.html">Proceed to Checkout</a></div><script src="https://code.jquery.com/jquery-3.7.1.min.js"></script><script src="js/app.js"></script><script>const cart=JSON.parse(localStorage.getItem('guest_cart')||'[]');let html='';let total=0;cart.forEach(i=>{const sub=i.price*i.quantity;total+=sub;html+=`<tr><td>${i.title}</td><td>$${i.price}</td><td>${i.quantity}</td><td>$${sub.toFixed(2)}</td></tr>`});$('#cartTable tbody').html(html+`<tr><th colspan='3'>Grand Total</th><th>$${total.toFixed(2)}</th></tr>`);</script></body></html>
