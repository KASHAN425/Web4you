<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Checkout</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head>
<body><div class="container py-5"><h1>Checkout</h1><form id="checkoutForm" class="card p-4"><div class="row"><div class="col-md-6"><input class="form-control mb-3" name="fullname" placeholder="Full name" required><input class="form-control mb-3" name="address" placeholder="Address" required></div><div class="col-md-6"><select class="form-select mb-3" name="payment_method"><option>Cash on Delivery</option><option>Manual Payment</option></select><textarea class="form-control mb-3" placeholder="Order notes"></textarea></div></div><button class="btn btn-primary">Place Order</button></form><div id="checkoutMsg" class="mt-3"></div></div><script src="https://code.jquery.com/jquery-3.7.1.min.js"></script><script src="js/app.js"></script><script>$('#checkoutForm').on('submit',e=>{e.preventDefault();$.post('includes/checkout.php',$('#checkoutForm').serialize(),r=>$('#checkoutMsg').html(`<div class='alert alert-success'>${r.message} #${r.order_id}</div>`),'json').fail(x=>$('#checkoutMsg').html(`<div class='alert alert-danger'>${x.responseJSON?.message||'Please login to checkout.'}</div>`));});</script></body></html>
