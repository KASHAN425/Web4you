<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Products - web4you</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head>
<body><div class="container py-4"><h1>Website Packages</h1><div class="row g-2 mb-4"><div class="col-md-4"><input id="search" class="form-control" placeholder="Search websites"></div><div class="col-md-2"><select id="category" class="form-select"><option value="">All Categories</option><option value="1">Business</option><option value="2">Portfolio</option><option value="3">Store</option><option value="4">Blog</option></select></div><div class="col-md-2"><input id="minPrice" class="form-control" type="number" placeholder="Min"></div><div class="col-md-2"><input id="maxPrice" class="form-control" type="number" placeholder="Max"></div><div class="col-md-2"><button class="btn btn-primary w-100" onclick="loadProducts()">Filter</button></div></div><div id="productsContainer" class="row"></div></div><script src="https://code.jquery.com/jquery-3.7.1.min.js"></script><script src="js/app.js"></script><script src="js/products.js"></script><script>loadProducts(); $('#search').on('input', loadProducts);</script></body></html>
