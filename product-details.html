<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Product Details</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head>
<body><div class="container py-5"><div id="productBox" class="card p-4">Loading...</div></div><script src="https://code.jquery.com/jquery-3.7.1.min.js"></script><script src="js/app.js"></script><script>const id=new URLSearchParams(location.search).get('id');$.getJSON('includes/products.php',{search:''},res=>{const p=res.products.find(x=>x.id==id); if(!p){$('#productBox').html('Product not found');return;} $('#productBox').html(`<h2>${p.title}</h2><p>${p.description}</p><p class='price-tag'>$${p.price}</p><a class='btn btn-outline-primary' href='${p.demo_link}' target='_blank'>Live Demo</a> <button class='btn btn-primary' onclick='addToGuestCart({"id":${p.id},"title":"${p.title}","price":${p.price}})'>Add to Cart</button>`);});</script></body></html>
